version: '3.8'

services:
  nuxt:
    image: zlii01/nuxt-app
    container_name: nuxt_app
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/nginx.conf
    depends_on:
      - nuxt